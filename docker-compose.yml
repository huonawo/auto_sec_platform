services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auto_sec_backend
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./output:/workspace/output
      - ./backend:/workspace/backend
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auto_sec_worker
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./output:/workspace/output
      - ./backend:/workspace/backend
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A tasks.scan_tasks worker --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks.scan_tasks inspect ping >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 5

  redis:
    image: redis:alpine
    container_name: auto_sec_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # Port not exposed to host — only accessible within Docker network

  kali:
    build:
      context: ./docker/kali
      dockerfile: Dockerfile
    container_name: auto_sec_kali
    volumes:
      - ./output:/workspace/output
    tty: true

  pentestgpt:
    build:
      context: .
      dockerfile: plugins/pentestgpt/Dockerfile
    container_name: auto_sec_pentestgpt
    environment:
      - AI_API_KEY=${AI_API_KEY}
      - MIMO_API_KEY=${MIMO_API_KEY}
      - AI_API_BASE_URL=${AI_API_BASE_URL:-https://api.xiaomimimo.com/v1}
      - AI_MODEL=${AI_MODEL:-mimo-v2.5-pro}
    ports:
      - "8001:8001"
    depends_on:
      - backend

  shannon:
    build:
      context: .
      dockerfile: plugins/shannon/Dockerfile
    container_name: auto_sec_shannon
    environment:
      - AI_API_KEY=${AI_API_KEY}
      - MIMO_API_KEY=${MIMO_API_KEY}
      - AI_API_BASE_URL=${AI_API_BASE_URL:-https://api.xiaomimimo.com/v1}
      - AI_MODEL=${AI_MODEL:-mimo-v2.5-pro}
    ports:
      - "8002:8002"
    depends_on:
      - backend
